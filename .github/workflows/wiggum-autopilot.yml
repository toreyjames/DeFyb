name: Wiggum Autopilot

on:
  schedule:
    - cron: "30 12 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  doctor-flow-autopilot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Generate autopilot report
        run: node scripts/autopilot-report.mjs autopilot-report.md

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: autopilot-report
          path: autopilot-report.md

      - name: Upsert backlog issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const title = 'Autopilot: Doctor Workflow Improvements';
            const body = fs.readFileSync('autopilot-report.md', 'utf8');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const existing = issues.find((i) => i.title === title);

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
              core.info(`Updated issue #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
              core.info(`Created issue #${created.data.number}`);
            }
